<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Betting Tracker</title>
    <style>
      /* === Page Styles === */
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
      }

      h1,
      h2 {
        color: #333;
      }

      form {
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        max-width: 400px;
      }

      form label {
        display: block;
        margin-bottom: 10px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
      }

      button {
        background: #007bff;
        color: #fff;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 4px;
      }

      button:hover {
        background: #0056b3;
      }

      #picksList {
        margin-top: 30px;
        list-style: none;
        padding: 0;
        max-width: 400px;
      }

      #picksList li {
        background: #fff;
        margin-bottom: 10px;
        padding: 10px;
        border-left: 5px solid #007bff;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <h1>Betting Tracker</h1>

    <!-- === Form to Add a Pick === -->
    <form id="pickForm">
      <label>Date: <input type="date" id="date" required /></label><br /><br />
      <label>Sport: <input type="text" id="sport" required /></label><br /><br />
      <label>Matchup: <input type="text" id="matchup" required /></label><br /><br />
      <label>Odds: <input type="number" id="odds" step="0.01" required /></label><br /><br />
      <label>Stake: <input type="number" id="stake" step="0.01" required /></label><br /><br />
      <label>
        Result:
        <select id="result">
          <option value="pending">Pending</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
        </select>
      </label><br /><br />
      <button type="submit">Save Pick</button>
    </form>

    <h2>Saved Picks</h2>

    <!-- === Stats Box (updates live) === -->
    <div
      id="statsBox"
      style="
        max-width: 400px;
        background: #fff;
        padding: 12px;
        border-left: 5px solid #28a745;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        margin-bottom: 12px;
        border-radius: 6px;
      "
    >
      <strong>Stats</strong>
      <div id="statsContent" style="margin-top: 6px; color: #333">
        Loading…
      </div>
    </div>

    <!-- === Picks List === -->
    <ul id="picksList"></ul>

    <script>
      // === Handle Form Submission ===
      const form = document.getElementById("pickForm");
      form.addEventListener("submit", async function (e) {
        e.preventDefault(); // prevent page reload

        // Build pick object from form
        const pickData = {
          date: document.getElementById("date").value,
          sport: document.getElementById("sport").value,
          matchup: document.getElementById("matchup").value,
          odds: parseFloat(document.getElementById("odds").value),
          stake: parseFloat(document.getElementById("stake").value),
          result: document.getElementById("result").value,
        };

        // Send pick to backend
        const response = await fetch("/picks/save-pick", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(pickData),
        });

        const data = await response.json();
        alert(data.message);

        form.reset(); // clear form
        loadPicks(); // refresh list
        loadStats(); // refresh stats
      });

      // === Function: Load Stats from Backend ===
      async function loadStats() {
        try {
          const res = await fetch("/picks/stats");
          const s = await res.json();

          const fmt = (n) => (Number.isFinite(n) ? Number(n).toFixed(2) : "0.00");
          const statsHTML = `
            <div>Total Picks: <strong>${s.total}</strong></div>
            <div>Wins: <strong>${s.wins}</strong> |
                 Losses: <strong>${s.losses}</strong> |
                 Pending: <strong>${s.pending}</strong></div>
            <div>Total Staked: <strong>$${fmt(s.totalStaked)}</strong></div>
            <div>Settled Staked: <strong>$${fmt(s.settledStaked)}</strong></div>
            <div>Profit: <strong>${s.profit >= 0 ? "+" : "-"}$${fmt(Math.abs(s.profit))}</strong></div>
            <div>ROI: <strong>${fmt(s.roiPct)}%</strong></div>
          `;
          document.getElementById("statsContent").innerHTML = statsHTML;
        } catch (e) {
          document.getElementById("statsContent").textContent =
            "Failed to load stats.";
        }
      }

      // === Function: Load Picks from Backend ===
      async function loadPicks() {
        const res = await fetch("/picks/get-picks");
        const picks = await res.json();

        const list = document.getElementById("picksList");
        list.innerHTML = ""; // clear old list

        picks.forEach((pick) => {
          const li = document.createElement("li");
          li.textContent = `${pick.date} | ${pick.sport} | ${pick.matchup} | Odds: ${pick.odds} | Stake: ${pick.stake} | Result: ${pick.result}`;

          // --- Result Buttons (Win / Loss / Pending) ---
          ["win", "loss", "pending"].forEach((res) => {
            const btn = document.createElement("button");
            btn.textContent = res.charAt(0).toUpperCase() + res.slice(1);
            btn.style.marginLeft = "6px";
            btn.style.background =
              res === "win"
                ? "#28a745"
                : res === "loss"
                ? "#dc3545"
                : "#ffc107";
            btn.style.color = "#fff";
            btn.style.border = "none";
            btn.style.padding = "5px 8px";
            btn.style.cursor = "pointer";
            btn.style.borderRadius = "4px";

            // When clicked, update result on backend
            btn.addEventListener("click", async () => {
              await fetch(`/picks/${pick.id}/result`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ result: res }),
              });
              loadPicks(); // refresh list
              loadStats(); // refresh stats
            });

            li.appendChild(btn);
          });

          // --- Delete Button ---
          const delBtn = document.createElement("button");
          delBtn.textContent = "Delete";
          delBtn.style.marginLeft = "10px";
          delBtn.style.background = "#6c757d";
          delBtn.style.color = "#fff";
          delBtn.style.border = "none";
          delBtn.style.padding = "5px 10px";
          delBtn.style.cursor = "pointer";
          delBtn.style.borderRadius = "4px";

          // When clicked, delete pick on backend
          delBtn.addEventListener("click", async () => {
            if (confirm("Are you sure you want to delete this pick?")) {
              await fetch(`/picks/delete-pick/${pick.id}`, { method: "DELETE" });
              loadPicks();
              loadStats();
            }
          });

          li.appendChild(delBtn);
          list.appendChild(li);
        });
      }

      // === Initial Load (when page first opens) ===
      loadPicks();
      loadStats();
    </script>
  </body>
</html>
